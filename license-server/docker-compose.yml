version: '3.8'

services:
  license-server:
    build: .
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-password}@db:5432/license_server
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - LICENSE_PRIVATE_KEY=${LICENSE_PRIVATE_KEY}
      - LICENSE_PUBLIC_KEY=${LICENSE_PUBLIC_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@llcpad.com}
      - ENVATO_WEBHOOK_SECRET=${ENVATO_WEBHOOK_SECRET}
      - GUMROAD_SELLER_ID=${GUMROAD_SELLER_ID}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - license-network

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=license_server
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - license-network

  # Optional: Database admin UI
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - license-network
    profiles:
      - dev

volumes:
  postgres_data:

networks:
  license-network:
    driver: bridge
